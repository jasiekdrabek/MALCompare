<div class="d-flex justify-content-center align-items-center gap-3 mt-3">

  {% if page_obj.has_previous %}
    <button
      class="btn btn-outline-primary btn-sm"
      hx-get="{% url 'compare_table_partial' table_type %}?{{ page_param }}={{ page_obj.previous_page_number }}"
      hx-target="#{{ table_type }}-table"
      hx-swap="outerHTML"
      hx-push-url="/compare/run/?{{ page_param }}={{ page_obj.previous_page_number }}"
    >
      ← Prev
    </button>
  {% else %}
    <button class="btn btn-outline-secondary btn-sm" disabled>
      ← Prev
    </button>
  {% endif %}

  <span class="text-muted small">
    Strona <strong>{{ page_obj.number }}</strong> z {{ page_obj.paginator.num_pages }}
  </span>

  {% if page_obj.has_next %}
    <button
      class="btn btn-outline-primary btn-sm"
      hx-get="{% url 'compare_table_partial' table_type %}?{{ page_param }}={{ page_obj.next_page_number }}"
      hx-target="#{{ table_type }}-table"
      hx-swap="outerHTML"
      hx-push-url="/compare/run/?{{ page_param }}={{ page_obj.next_page_number }}"
    >
      Next →
    </button>
  {% else %}
    <button class="btn btn-outline-secondary btn-sm" disabled>
      Next →
    </button>
  {% endif %}

</div>
