<div class="filter-block score-filter">
  <div>
  <label><strong>Ocena</strong></label>
  <div class="d-flex gap-2 input-group input-group-sm">
    <input type="number" min="0" max="10" step="1" data-filter="score_min" value="{{ score_min|default_if_none:'0' }}" max="{{ score_max|default_if_none:'' }}">
    <input type="number" min="1" max="10" step="1" data-filter="score_max" value="{{ score_max|default_if_none:'10' }}" min="{{ score_min|default_if_none:'' }}">
    <button type="button" class="btn btn-sm btn-outline-primary apply-score">
      Zastosuj
    </button>
  </div>
  </div>
</div>
