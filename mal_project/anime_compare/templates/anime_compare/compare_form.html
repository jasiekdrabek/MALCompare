{% load static %}
<!DOCTYPE html>
<html>
  <head>
    <title>Porównanie list MAL</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    />
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link rel="stylesheet" href="{% static 'anime_compare/css/compare_result.css' %}">
  </head>
  <body class="p-4">
    <h2>Porównaj dwóch użytkowników MyAnimeList</h2>
    <form
      method="post"
      hx-post="{% url 'compare_users' %}"
      hx-target="#compare-results"
      hx-swap="innerHTML"
      class="mt-3"
    >
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label">Użytkownik A</label>
        <input type="text" name="user_a" required class="form-control" />
      </div>

      <div class="mb-3">
        <label class="form-label">Użytkownik B</label>
        <input type="text" name="user_b" required class="form-control" />
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">
          Porównaj
        </button>
        <button
          type="submit"
          class="btn btn-outline-secondary"
          name="demo"
          value="1"
          formnovalidate
        >
          Pokaż przykład
        </button>
      </div>
    </form>
    <div id="compare-results"></div>
  </body>
</html>
